task:
  pregrasp_obj_rel: [0.00, 0.000, -0.08]
  grasp_obj_rel: [0.000, 0.000, 0.0]
  preplace_target_rel: [0.01, 0.01, -0.08]
  place_target_rel: [0.001, 0.001, 0.0]
  use_object_local_xy_errors: true

  reach_xy_threshold: 0.025
  reach_z_threshold: 0.025
  descend_threshold: 0.01
  descend_x_threshold: 0.01
  descend_y_threshold: 0.01
  descend_z_threshold: 0.01
  descend_contact_z_threshold: 0.00
  descend_timeout_x_threshold: 0.05
  descend_timeout_y_threshold: 0.05
  descend_timeout_z_threshold: 0.05
  descend_max_steps: 220

  preplace_threshold: 0.04
  place_threshold: 0.03
  preplace_xy_threshold: 0.02
  preplace_z_threshold: 0.03
  place_xy_threshold: 0.02
  place_z_threshold: 0.01

  stable_contact_steps: 8
  close_hold_steps: 100
  lift_test_steps: 18
  open_hold_steps: 100
  retreat_steps: 24

  lift_test_obj_rel_drift_max: 0.06

  transit_height: 0.35
  transit_z_threshold: 0.02

  max_retries: 3
  retry_reach_cooldown_steps: 20

  descend_stop_contact_steps: 2
  descend_ready_steps: 6

policy:
  descend_max_step_scale: 0.75
  place_descend_max_step_scale: 0.75
  descend_xy_correction_gain: 1.15
  descend_xy_correction_max: 0.055
  descend_xy_priority_threshold: 0.005
  descend_axis_priority_enabled: true
  descend_xy_then_z: true
  descend_xy_lock_threshold: 0.004
  descend_xy_unlock_threshold: 0.01

  reach_xy_first_threshold: 0.035
  reach_slowdown_threshold: 0.75
  reach_slowdown_scale: 0.80
  reach_arc_enabled: true
  reach_arc_angle_trigger_deg: 50.0
  reach_arc_max_theta_step_deg: 12.0
  reach_arc_radial_step_max: 0.03
  reach_arc_min_radius: 0.12
  reach_arc_max_radius: 0.78
  enable_object_yaw_align: true
  object_yaw_offset_deg: 90.0
  dynamic_grip_enabled: true
  dynamic_grip_contact_margin: 0.004
  dynamic_grip_min_close_width: 0.0
  dynamic_open_enabled: true
  dynamic_open_object_width: 0.04
  dynamic_open_margin: 0.01
  dynamic_open_contact_boost: 0.003

  preplace_xy_first_threshold: 0.03
  preplace_slowdown_threshold: 0.08
  preplace_slowdown_scale: 0.75

  place_descend_xy_correction_gain: 1.15
  place_descend_xy_correction_max: 0.055
  place_descend_xy_priority_threshold: 0.01
  place_descend_xy_lock_threshold: 0.01
  place_descend_xy_unlock_threshold: 0.08

  obs_smooth_alpha: 0.40
  lift_z_offset: 0.04
  retreat_offset: [-0.012, 0.0, 0.10]
