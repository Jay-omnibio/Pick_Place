# Central tuning file for pick/place behavior.
# Runtime is strict: all keys are required and unknown keys cause an error.
# This file is the source of truth for Task/Policy/Controller tuning values.

run:
  control_mode: fsm # then_what: Select high-level controller mode used by run_pick_place.py.
  log_every_steps: 100 # then_what: Print console logs every N sim steps.

task:
  pregrasp_obj_rel: [0.001, 0.001, -0.08] # then_what: ReachAbove target (object in EE frame) before descend.
  grasp_obj_rel: [-0.005, 0.001, 0.0] # then_what: Descend target (object in EE frame) where close should happen.
  preplace_target_rel: [0.01, 0.01, -0.08] # then_what: MoveToPlaceAbove target (place site in EE frame).
  place_target_rel: [0.001, 0.001, 0.0] # then_what: DescendToPlace target (place site in EE frame) before open.

  reach_xy_threshold: 0.015 # then_what: ReachAbove -> Descend requires XY error <= this.
  reach_z_threshold: 0.025 # then_what: ReachAbove -> Descend requires Z error <= this.
  descend_threshold: 0.02 # then_what: Descend success by full 3D norm (fallback with axis checks).
  descend_xy_threshold: 0.50 # then_what: Legacy/unused in FSM transition logic; keep only for compatibility.
  descend_x_threshold: 0.01 # then_what: Descend ready/success X-axis gate.
  descend_y_threshold: 0.05 # then_what: Descend ready/success Y-axis gate.
  descend_z_threshold: 0.01 # then_what: Descend ready/success Z-axis gate.
  descend_contact_z_threshold: 0.00 # then_what: Contact-based descend stop allowed only when Z error <= this.
  descend_timeout_xy_threshold: 0.05 # then_what: Legacy/unused; timeout currently uses per-axis values below.
  descend_timeout_x_threshold: 0.05 # then_what: Descend timeout path requires X error <= this.
  descend_timeout_y_threshold: 0.05 # then_what: Descend timeout path requires Y error <= this.
  descend_timeout_z_threshold: 0.05 # then_what: Descend timeout path requires Z error <= this.
  descend_max_steps: 220 # then_what: Max steps in Descend before timeout path can trigger.

  preplace_threshold: 0.04 # then_what: MoveToPlaceAbove success by full 3D norm.
  place_threshold: 0.03 # then_what: DescendToPlace success by full 3D norm.
  preplace_xy_threshold: 0.02 # then_what: MoveToPlaceAbove success by axis gating (XY part).
  preplace_z_threshold: 0.03 # then_what: MoveToPlaceAbove success by axis gating (Z part).
  place_xy_threshold: 0.02 # then_what: DescendToPlace success by axis gating (XY part).
  place_z_threshold: 0.01 # then_what: DescendToPlace success by axis gating (Z part).

  stable_contact_steps: 8 # then_what: Close -> LiftTest needs this many consecutive contact=1 steps.
  close_hold_steps: 100 # then_what: Minimum steps to stay in Close before LiftTest checks pass.
  lift_test_steps: 18 # then_what: Steps to verify object stays held before Transit.
  open_hold_steps: 100 # then_what: Steps to stay in Open before Retreat.
  retreat_steps: 24 # then_what: Steps to stay in Retreat before Done.

  lift_test_obj_rel_drift_max: 0.06 # then_what: LiftTest fails if object-relative drift exceeds this.
  transit_height: 0.35 # then_what: Target EE Z for safe vertical lift before moving to place.
  transit_z_threshold: 0.02 # then_what: Transit considered reached when EE Z is within this margin.
  max_retries: 3 # then_what: Maximum failed grasp retries before Failure phase.
  retry_reach_cooldown_steps: 20 # then_what: Delay steps after retry before ReachAbove can switch again.
  descend_stop_contact_steps: 2 # then_what: Contact-based descend stop needs this many consecutive contact steps.
  descend_ready_steps: 6 # then_what: Descend XY+Z must stay valid for this many steps before close allowed.

policy:
  descend_max_step_scale: 0.75 # then_what: Scales motion step size during Descend.
  place_descend_max_step_scale: 0.75 # then_what: Scales motion step size during DescendToPlace.
  descend_xy_correction_gain: 1.15 # then_what: Gain for XY correction while descending to grasp.
  descend_xy_correction_max: 0.055 # then_what: Cap for XY correction magnitude in Descend.
  descend_xy_priority_threshold: 0.01 # then_what: Above this XY error, policy prioritizes XY correction before Z.
  descend_xy_lock_threshold: 0.004 # then_what: Lock XY target when error gets below this value.
  descend_xy_unlock_threshold: 0.08 # then_what: Unlock XY lock if error grows above this value.

  reach_xy_first_threshold: 0.03 # then_what: In ReachAbove, prioritize XY-only move when far laterally.
  reach_slowdown_threshold: 0.08 # then_what: In ReachAbove, slow down once near pregrasp target.
  reach_slowdown_scale: 0.95 # then_what: Step scale applied when reach slowdown is active.
  enable_object_yaw_align: true # then_what: In ReachAbove/Descend, align gripper yaw to object yaw (top-down remains active).
  object_yaw_offset_deg: 90.0 # then_what: Added to object yaw for grasp approach; 90 means perpendicular grasp to object long axis.

  preplace_xy_first_threshold: 0.03 # then_what: In MoveToPlaceAbove, prioritize XY-only move when far laterally.
  preplace_slowdown_threshold: 0.08 # then_what: In MoveToPlaceAbove, slow down when near preplace target.
  preplace_slowdown_scale: 0.75 # then_what: Step scale applied when preplace slowdown is active.

  place_descend_xy_correction_gain: 1.15 # then_what: Gain for XY correction while descending to place.
  place_descend_xy_correction_max: 0.055 # then_what: Cap for XY correction magnitude in DescendToPlace.
  place_descend_xy_priority_threshold: 0.01 # then_what: XY-priority threshold for place descend.
  place_descend_xy_lock_threshold: 0.01 # then_what: XY lock threshold for place descend (0 disables lock behavior).
  place_descend_xy_unlock_threshold: 0.08 # then_what: XY unlock threshold for place descend (0 disables unlock behavior).

  obs_smooth_alpha: 0.40 # then_what: Observation smoothing factor (higher = less smoothing).
  lift_z_offset: 0.04 # then_what: Vertical lift amount used in LiftTest.
  retreat_offset: [-0.012, 0.0, 0.10] # then_what: Cartesian retreat offset applied in Retreat phase.

controller:
  max_step: 0.03 # then_what: Max Cartesian step toward target per control tick.
  min_height: 0.02 # then_what: Minimum EE Z command allowed by controller safety clamp.
  max_target_radius: 0.78 # then_what: Max horizontal radius from origin allowed for EE targets.

  ik_damping: 0.03 # then_what: Damped least-squares IK regularization strength.
  nullspace_gain: 0.15 # then_what: Joint-nullspace centering gain in normal motion.
  nullspace_gain_grasp: 0.05 # then_what: Joint-nullspace centering gain while closing/grasping.
  max_joint_step: 0.20 # then_what: Max norm of joint delta per control tick.
  ee_tolerance: 0.0001 # then_what: Deadband for tiny EE target movements.
  move_smoothing: 0.55 # then_what: Smoothing factor for commanded EE motion.

  yaw_target: 3 # then_what: Desired yaw direction index/angle for hand orientation objective.
  yaw_weight: 0.25 # then_what: Yaw objective weight in normal motion.
  yaw_weight_grasp: 1.0 # then_what: Yaw objective weight during grasp-related phases.
  enable_yaw_objective: true # then_what: Enable/disable yaw orientation objective globally.
  yaw_axis: 1 # then_what: End-effector local axis used to compute yaw.
  enable_topdown_objective: true # then_what: Enable/disable top-down hand alignment objective.
  topdown_weight: 0.60 # then_what: Top-down objective weight in normal motion.
  topdown_weight_grasp: 1.20 # then_what: Top-down objective weight during grasp-related phases.
  tool_axis: 2 # then_what: End-effector local axis treated as tool/down axis.

  gripper_open_width: 0.060 # then_what: Target total finger gap for open mode.
  gripper_close_width: 0.0 # then_what: Target total finger gap for close mode.
  gripper_rate: 0.03 # then_what: Max width change per control tick.
  gripper_width_tol: 0.0015 # then_what: Width error tolerance for READY state.
  gripper_speed_tol: 0.002 # then_what: Speed tolerance for READY state.
  gripper_switch_cooldown_steps: 6 # then_what: Cooldown after mode switch before another open/close switch.
  debug_every_steps: 100 # then_what: Print controller debug line every N steps.
